<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gudiel</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#0d1117;
    color:white;
}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    padding:20px;
    background:#161b22;
}

nav h1{
    color:#00e676;
}

nav a{
    color:white;
    margin-left:15px;
    text-decoration:none;
}

/* HERO */
.hero{
    text-align:center;
    padding:60px 20px;
}

.hero h2{
    font-size:35px;
}

.hero p{
    margin-top:10px;
    color:#aaa;
}

/* SECCION */
.section{
    padding:40px 20px;
    text-align:center;
}

.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    margin-top:20px;
}

/* CARD */
.card{
    background:#161b22;
    width:260px;
    padding:20px;
    border-radius:10px;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

.card h3{
    color:#00e676;
}

.card p{
    font-size:14px;
    margin:10px 0;
}

button{
    width:100%;
    padding:10px;
    border:none;
    background:#00c853;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#00e676;
}

/* FOOTER */
footer{
    background:#161b22;
    text-align:center;
    padding:20px;
    margin-top:30px;
    color:#aaa;
}
</style>
</head>

<body>

<nav>
    <h1>Gudiel</h1>
    <div>
        <a href="#">Inicio</a>
        <a href="#proyectos">Proyectos</a>
        <a href="#info">Info</a>
    </div>
</nav>

<div class="hero">
    <h2>Mis Proyectos</h2>
    <p>Descarga mis trabajos y herramientas</p>
</div>

<div class="section" id="proyectos">
    <h2>Descargas</h2>

    <div class="container">

        <div class="card">
            <h3>🧮 Calculadora</h3>
            <p>Divisiónesh.html</p>
            <a href="Divisiónesh.html">
                <button>Abrir</button>
            </a>
        </div>

        <div class="card">
            <h3>🧾 Sistema POS</h3>
            <p>Proyecto de ventas completo</p>
            <a href="archivos/pos.zip" download>
                <button>Descargar</button>
            </a>
        </div>

        <div class="card">
            <h3>📦 Próximamente</h3>
            <p>No disponible</p>
            <button disabled>No disponible</button>
        </div>

    </div>
</div>

<div class="section" id="info">
    <h2>Información</h2>
    <p>No disponible</p>
</div>

<footer>
© 2026 Gudiel
</footer>

</body>
</html>
